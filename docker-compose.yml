services:
  postgres:
    image: postgres:16-alpine
    container_name: flavor-odyssey-postgres
    hostname: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-flavor_odyssey}
      POSTGRES_USER: ${POSTGRES_USER:-flavor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flavor}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flavor} -d ${POSTGRES_DB:-flavor_odyssey}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: flavor-odyssey-redis
    hostname: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
